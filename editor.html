<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NimTD Map Editor</title>
<style>
*{box-sizing:border-box}body{margin:0;overflow:hidden;background:#090b16;color:#d8deed;font:12px Segoe UI,Arial,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}#app{display:grid;grid-template-columns:226px 1fr 292px;height:100vh}.panel{overflow:auto;padding:12px;background:#12172a;border-color:#303b59;border-style:solid}.left{border-width:0 1px 0 0}.right{border-width:0 0 0 1px}h1{font-size:15px;letter-spacing:.16em;color:#e5edf9}h3{margin:16px 0 7px;color:#e6a857;font-size:11px;letter-spacing:.13em}.tool,.tower,.btn{display:block;width:100%;margin:4px 0;padding:7px 8px;border:1px solid #3b496a;border-radius:4px;background:#1b233c;color:#d8deed;text-align:left}.active{border-color:#e6a857;background:#353047}.row{display:flex;gap:5px}.row>*{min-width:0;flex:1}label{display:block;margin:7px 0 3px;color:#9da9bf;font-size:10px}input,select,textarea{width:100%;padding:5px;border:1px solid #3b496a;border-radius:3px;background:#0c1120;color:#eef3ff}.primary{border-color:#3d8463;background:#1f503e}.danger{border-color:#863b4c;background:#572434}#stage{position:relative;overflow:hidden}canvas{display:block;width:100%;height:100%}#status{position:absolute;left:12px;bottom:12px;padding:7px 10px;border:1px solid #3b496a;border-radius:4px;background:#12172ae8;color:#b6c1d7;font-size:11px}small{color:#8f9bb3}.modal{position:fixed;inset:0;display:grid;place-items:center;padding:24px;background:#050713cc;z-index:4}.modal[hidden]{display:none}.dialog{width:min(760px,100%);max-height:calc(100vh - 48px);overflow:auto;padding:16px;border:1px solid #4b5c83;border-radius:7px;background:#12172a;box-shadow:0 24px 60px #000b}.dialog-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.dialog-head h2{margin:0;color:#eef3ff;font-size:17px;letter-spacing:.08em}.dialog-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}.dialog-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:14px}.dialog-actions .btn{width:auto;min-width:110px}.color-row{display:grid;grid-template-columns:42px 1fr;gap:7px;align-items:center}.color-row input[type=color]{height:34px;padding:2px}.palette{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-top:6px}.swatch{height:18px;border:1px solid #ffffff44;border-radius:2px}.swatch:hover{border-color:#fff}.section-note{margin:3px 0 8px;color:#8f9bb3;font-size:10px;line-height:1.4}
</style></head><body>
<div id="app"><aside class="panel left"><h1>NIMTD EDITOR</h1><h3>TILE SET</h3><div id="tools"></div><h3>GRID</h3><div class="row"><input id="width" type="number" min="5" max="100"><input id="height" type="number" min="5" max="100"></div><button class="btn" id="resize">Apply dimensions</button><h3>MAP FILES</h3><button class="btn primary" id="save">Save map file</button><button class="btn" id="open-folder">Open maps folder</button><div id="saved-maps"></div><button class="btn" id="export">Export map file</button><button class="btn" id="import">Import map file</button><button class="btn primary" id="test">Play test</button><button class="btn" id="game">Return to menu</button></aside>
<main id="stage"><canvas id="map"></canvas><div id="status">Left drag paints | Right drag pans | Wheel zooms</div></main>
<aside class="panel right"><h3>MAP VARIABLES</h3><label>Map name</label><input id="map-name"><label>Waves</label><input id="waves" type="number" min="1"><label>Enemies on wave 1</label><input id="enemies" type="number" min="1"><label>Additional enemies per wave</label><input id="enemy-growth" type="number" min="0" step=".1"><h3>GAME VALUES</h3><label>Starting gold</label><input id="starting-gold" type="number" min="0"><label>Starting lives</label><input id="starting-lives" type="number" min="1"><label>Initial spawn delay frames</label><input id="spawn-delay" type="number" min="1"><label>Minimum spawn delay frames</label><input id="minimum-spawn-delay" type="number" min="1"><label>Spawn delay reduction per round</label><input id="spawn-delay-reduction" type="number" min="0" step=".01"><label>Round reward base</label><input id="round-gold-base" type="number" min="0"><label>Round reward growth</label><input id="round-gold-growth" type="number" min="0"><label>Game speed base</label><input id="speed-base" type="number" min=".1" step=".01"><label>Game speed growth per round</label><input id="speed-growth" type="number" min="0" step=".001"><h3>TOWER MODS</h3><button class="btn primary" id="new-tower">New Tower</button><div id="towers"></div><div id="tower-fields"></div></aside></div><input id="file" type="file" accept=".nimmaps" hidden>
<div class="modal" id="tower-modal" hidden><section class="dialog" role="dialog" aria-modal="true" aria-labelledby="tower-dialog-title"><div class="dialog-head"><h2 id="tower-dialog-title">CREATE NEW TOWER</h2><button class="btn" id="tower-cancel-top">Close</button></div><p class="section-note">Start from one of the 25 projectile prefabs, then tune the tower. The color controls use the system RGB picker and a Paint-style quick palette.</p><div class="dialog-grid"><div><label>Tower name</label><input id="create-name" value="Custom Tower"><label>Icon letter</label><input id="create-icon" maxlength="2" value="N"><label>Model style</label><select id="create-model"></select><label>Tower model color</label><div class="color-row"><input id="create-color" type="color" value="#88aacc"><input id="create-color-text" value="#88aacc" maxlength="7"></div><div class="palette" id="tower-palette"></div><label>Description</label><textarea id="create-description" rows="3">A custom map tower.</textarea></div><div><label>Projectile prefab</label><select id="create-projectile"></select><label>Projectile color</label><div class="color-row"><input id="create-projectile-color" type="color" value="#ffcc44"><input id="create-projectile-color-text" value="#ffcc44" maxlength="7"></div><div class="palette" id="projectile-palette"></div><div id="create-fields"></div></div></div><div class="dialog-actions"><button class="btn" id="tower-cancel">Cancel</button><button class="btn primary" id="tower-create">Add tower</button></div></section></div>
<script src="js/game-config.js"></script><script src="js/towers.js"></script><script src="js/editor.js"></script><script src="js/sound.js"></script><script src="js/audio-ui.js"></script></body></html>
