<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NimTD</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;background:#090b17 url("splash/logo.png") center/cover no-repeat;color:#dce5f7;font-family:Segoe UI,Arial,sans-serif}body:before{content:"";position:fixed;inset:0;background:linear-gradient(180deg,#05071370,#050713aa 62%,#050713e0),radial-gradient(circle at center,#0001 10%,#0008 100%),linear-gradient(#ffffff08 1px,transparent 1px),linear-gradient(90deg,#ffffff08 1px,transparent 1px);background-size:auto,auto,48px 48px,48px 48px}main{position:relative;width:min(560px,calc(100vw - 36px));padding:34px;border:1px solid #4b5877;border-radius:12px;background:#10162aef;box-shadow:0 28px 80px #000d,0 0 0 1px #ffffff08}h1{margin:0;color:#f3f6ff;font-size:42px;letter-spacing:.16em;text-shadow:0 3px 16px #000}p{margin:8px 0 26px;color:#aab6ca}.menu{display:grid;gap:10px}.menu button,.menu-map{display:block;width:100%;padding:14px 16px;border:1px solid #3c4a6b;border-radius:6px;background:#1d2743ed;color:#dce5f7;text-align:left;cursor:pointer}.menu button:hover,.menu-map:hover{border-color:#e4a957;background:#293556f5}.menu b{display:block;font-size:14px;letter-spacing:.08em}.menu span{display:block;margin-top:4px;color:#a3b0c8;font-size:11px}#map-list{display:grid;gap:6px;margin-top:10px}.menu-map{padding:10px 12px}.empty,#menu-status{margin-top:10px;color:#aab5c8;font-size:12px}
</style>
</head>
<body><main><h1>NIMTD</h1><p>Pseudo-isometric tower defense engine</p><div class="menu"><button id="normal-game"><b>NORMAL GAME</b><span>Play the original map and values.</span></button><button id="load-map"><b>LOAD A MAP</b><span>Choose a .nimmaps file from NimTD/maps.</span></button><button id="open-folder"><b>OPEN MAPS FOLDER</b><span>Open NimTD/maps in File Explorer.</span></button><button id="editor"><b>MAP EDITOR</b><span>Create routes, tune values, and save mods.</span></button></div><div id="map-list"></div><div id="menu-status"></div></main><script src="js/menu.js"></script><script src="js/sound.js"></script><script src="js/audio-ui.js"></script><script>setTimeout(()=>window.NimTD?.sound?.playMusic('menu',{volume:.4}),500);</script></body>
</html>
